name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Update waka readme stats
        uses: ./
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BAR_STYLE: "svg"
          BAR_COLOR: "#90CAF9"
          BAR_TRACK_COLOR: "#172f45"
          BAR_RADIUS: "4"
