name: Waka Readme

on:
  schedule:
    # Runs at 6:30 PM UTC daily
    - cron: '30 18 * * *'
  workflow_dispatch:

# If you use anmol098/waka-readme-stats@master and see "Unexpected input" for BAR_*,
# remove those `with:` keys there until upstream action.yml lists them (env may still differ).
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BAR_STYLE: "svg"
          BAR_COLOR: "#90CAF9"
          BAR_TRACK_COLOR: "#172f45"
          BAR_RADIUS: "4"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_TIMEZONE: "False"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_OS: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
